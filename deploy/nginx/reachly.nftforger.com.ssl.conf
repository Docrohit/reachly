server {
    listen 80;
    server_name reachly.nftforger.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name reachly.nftforger.com;

    ssl_certificate /etc/letsencrypt/live/reachly.nftforger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reachly.nftforger.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/reachly-saas-access.log combined;
    error_log  /var/log/nginx/reachly-saas-error.log warn;

    client_max_body_size 12M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8050/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8050;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
