# Reachly dashboard — reverse proxy to local uvicorn (port 8765).
# SSL terminates at ALB (same pattern as dev-genai.hygaar.com).
# Install: sudo bash deploy/setup_nginx.sh

server {
    listen 80;
    server_name reach.hygaar.com;

    access_log /var/log/nginx/reachly-access.log combined;
    error_log  /var/log/nginx/reachly-error.log warn;

    client_max_body_size 4M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    location / {
        proxy_pass http://127.0.0.1:8765;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
